<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GAME Playground — Compile GPU Visuals from Text</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'JetBrains Mono', 'Fira Code', monospace; display: flex; height: 100vh; }
    #editor-panel { width: 45%; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; }
    #preview-panel { width: 55%; display: flex; flex-direction: column; }
    h1 { font-size: 16px; font-weight: 400; color: #666; margin-bottom: 12px; letter-spacing: 1px; }
    textarea { flex: 1; background: #111; color: #d4d4d4; border: 1px solid #222; border-radius: 8px; padding: 16px; font-family: inherit; font-size: 13px; resize: none; line-height: 1.6; }
    textarea:focus { outline: none; border-color: #333; }
    #controls { padding: 12px 0; display: flex; gap: 10px; align-items: center; }
    button { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; }
    button:hover { background: #252525; }
    #status { font-size: 11px; color: #666; flex: 1; }
    #error { color: #ef4444; font-size: 11px; padding: 8px 0; min-height: 20px; }
    #preview { flex: 1; background: #000; position: relative; }
    #preview > * { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="editor-panel">
    <h1>GAME PLAYGROUND</h1>
    <textarea id="source" spellcheck="false">// Try editing this — hit Compile to see it render
cinematic "nebula" {
  layer stars {
    warp(scale: 2.0, octaves: 3, strength: 0.15)
    | voronoi(20.0)
    | glow(8.0)
    | tint(0.9, 0.92, 1.0)
  }

  layer gas opacity: 0.6 blend: add {
    translate(time * 0.02, time * 0.01)
    | warp(scale: 0.4, octaves: 5, persistence: 0.65, strength: 0.3)
    | fbm(scale: 0.5, octaves: 5, persistence: 0.55)
    | palette(
        a_r: 0.2, a_g: 0.1, a_b: 0.3,
        b_r: 0.3, b_g: 0.2, b_b: 0.4,
        c_r: 1.0, c_g: 1.0, c_b: 1.0,
        d_r: 0.0, d_g: 0.15, d_b: 0.4
    )
  }

  layer dust opacity: 0.3 blend: screen {
    translate(time * -0.015, time * 0.008)
    | warp(scale: 0.8, octaves: 4, persistence: 0.6, strength: 0.2)
    | simplex(1.5)
    | glow(1.5)
    | tint(0.5, 0.3, 0.7)
  }

  pass frame { vignette(0.35) }
  pass film { film_grain(0.015) }
}</textarea>
    <div id="controls">
      <button id="compile-btn" onclick="compile()">Compile</button>
      <span id="status">Ready</span>
    </div>
    <div id="error"></div>
  </div>
  <div id="preview-panel">
    <div id="preview"></div>
  </div>

  <script type="module">
    import init, { compileGame, validateGame, getBuiltins } from '../pkg/game_compiler.js';

    let wasmReady = false;

    async function initWasm() {
      try {
        await init();
        wasmReady = true;
        document.getElementById('status').textContent = 'WASM compiler loaded — ready';
        // Auto-compile on load
        compile();
      } catch(e) {
        document.getElementById('error').textContent = 'WASM load failed: ' + e.message;
      }
    }

    window.compile = function() {
      if (!wasmReady) return;
      const source = document.getElementById('source').value;
      const errorEl = document.getElementById('error');
      const statusEl = document.getElementById('status');
      const preview = document.getElementById('preview');

      errorEl.textContent = '';
      statusEl.textContent = 'Compiling...';

      try {
        const t0 = performance.now();
        const resultJson = compileGame(source, 'both');
        const t1 = performance.now();
        const results = JSON.parse(resultJson);

        if (results.length === 0) {
          errorEl.textContent = 'No output generated';
          return;
        }

        const r = results[0];
        statusEl.textContent = `Compiled "${r.name}" in ${(t1-t0).toFixed(1)}ms — ${(r.js.length/1024).toFixed(1)}KB`;

        // Inject the compiled component
        preview.innerHTML = '';

        // Create a blob URL for the JS
        const blob = new Blob([r.js], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);

        // Load the component
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          // Find the custom element name from the JS
          const match = r.js.match(/customElements\.define\('([^']+)'/);
          if (match) {
            const el = document.createElement(match[1]);
            el.style.display = 'block';
            el.style.width = '100%';
            el.style.height = '100%';
            preview.appendChild(el);
          }
          URL.revokeObjectURL(url);
        };
        document.head.appendChild(script);

      } catch(e) {
        errorEl.textContent = e.toString();
        statusEl.textContent = 'Error';
      }
    };

    initWasm();
  </script>
</body>
</html>
